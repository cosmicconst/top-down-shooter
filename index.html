<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; background: #050505;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: monospace; color: #00ff00;
    }
    h1 {
      font-size: 48px; letter-spacing: 6px; margin-bottom: 8px;
      text-shadow: 0 0 15px #00ff00, 0 0 30px #00aa00;
    }
    .sub { font-size: 13px; color: #006600; margin-bottom: 60px; letter-spacing: 2px; }
    .games { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 280px; border: 1px solid #00ff0044;
      background: #0a0a0a; padding: 32px 24px;
      text-decoration: none; color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .card:hover {
      border-color: #00ff00;
      box-shadow: 0 0 20px #00ff0033;
    }
    .card .icon { font-size: 40px; }
    .card .title { font-size: 18px; letter-spacing: 3px; color: #00ff00; }
    .card .desc { font-size: 12px; color: #006600; text-align: center; line-height: 1.8; }
    .card .play {
      margin-top: 8px; font-size: 12px; color: #004400;
      border: 1px solid #003300; padding: 6px 20px;
      letter-spacing: 2px;
    }
    .card:hover .play { color: #00ff00; border-color: #00ff00; }
    footer { margin-top: 60px; font-size: 11px; color: #002200; letter-spacing: 1px; }
  </style>
</head>
<body>
  <h1>ARCADE</h1>
  <div class="sub">── SELECT A GAME ──</div>
  <div class="games">
    <a class="card" href="shooter.html">
      <div class="icon">🎯</div>
      <div class="title">TOP-DOWN SHOOTER</div>
      <div class="desc">
        Retro pixel-art shooter.<br>
        4 levels · 4 enemy types<br>
        Arrow keys · Mouse to aim
      </div>
      <div class="play">[ PLAY ]</div>
    </a>
    <a class="card" href="tictactoe.html">
      <div class="icon">⬜</div>
      <div class="title">TIC-TAC-TOE</div>
      <div class="desc">
        Classic two-player game.<br>
        Cumulative score tracking<br>
        &nbsp;
      </div>
      <div class="play">[ PLAY ]</div>
    </a>
  </div>
  <footer>OPEN SOURCE · cosmicconst.github.io</footer>
</body>
</html>

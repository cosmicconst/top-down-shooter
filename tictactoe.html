<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      min-height: 1.6em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.6);
    }

    #restart {
      padding: 10px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 40px;
      font-size: 1rem;
      color: #ccc;
    }

    .score-box { text-align: center; }
    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .score-box .label { font-size: 0.85rem; color: #888; margin-top: 2px; }
    #score-x span { color: #e94560; }
    #score-o span { color: #a8dadc; }
    #score-draw span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box" id="score-x">
      <span id="x-count">0</span>
      <div class="label">X Wins</div>
    </div>
    <div class="score-box" id="score-draw">
      <span id="draw-count">0</span>
      <div class="label">Draws</div>
    </div>
    <div class="score-box" id="score-o">
      <span id="o-count">0</span>
      <div class="label">O Wins</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function updateScores() {
      document.getElementById('x-count').textContent = scores.X;
      document.getElementById('o-count').textContent = scores.O;
      document.getElementById('draw-count').textContent = scores.D;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${current} wins!`;
          scores[current]++;
          updateScores();
          over = true;
        } else if (board.every(v => v)) {
          status.textContent = "It's a draw!";
          scores.D++;
          updateScores();
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
